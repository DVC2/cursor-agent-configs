name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    name: Validate configs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Validate frontmatter (.mdc rules + SKILL.md + agents)
        run: |
          python3 - <<'PY'
          import sys, glob, re
          fails = []

          def frontmatter(path):
              with open(path, encoding="utf-8") as f:
                  text = f.read()
              if not text.startswith("---"):
                  return None, "missing frontmatter"
              # Exactly one leading --- ... --- block. A doubled block is the classic bug.
              m = re.match(r"^---\n(.*?)\n---\n", text, re.S)
              if not m:
                  return None, "malformed frontmatter"
              rest = text[m.end():]
              if rest.lstrip().startswith("---"):
                  return None, "doubled frontmatter block"
              return m.group(1), None

          # Rules (active + template packs)
          for p in glob.glob(".cursor/rules/*.mdc") + glob.glob("templates/**/*.mdc", recursive=True):
              fm, err = frontmatter(p)
              if err: fails.append(f"{p}: {err}"); continue
              n = sum(1 for _ in open(p, encoding="utf-8"))
              if n > 500: fails.append(f"{p}: {n} lines (>500)")

          # Skills: name must equal folder name
          for p in glob.glob(".cursor/skills/*/SKILL.md"):
              fm, err = frontmatter(p)
              if err: fails.append(f"{p}: {err}"); continue
              folder = p.split("/")[-2]
              nm = re.search(r"^name:\s*(\S+)", fm, re.M)
              if not nm: fails.append(f"{p}: missing name")
              elif nm.group(1) != folder:
                  fails.append(f"{p}: name '{nm.group(1)}' != folder '{folder}'")

          # Subagents: must have name, must NOT have a tools: field
          for p in glob.glob(".cursor/agents/*.md"):
              fm, err = frontmatter(p)
              if err: fails.append(f"{p}: {err}"); continue
              if not re.search(r"^name:\s*\S+", fm, re.M):
                  fails.append(f"{p}: missing name")
              if re.search(r"^tools:", fm, re.M):
                  fails.append(f"{p}: has 'tools:' (not a Cursor subagent field)")

          if fails:
              print("FAIL:"); [print(" -", x) for x in fails]; sys.exit(1)
          print("OK: frontmatter valid")
          PY

      - name: Validate hooks.json
        run: |
          python3 -c "import json; d=json.load(open('.cursor/hooks.json')); assert d.get('version')==1, 'version must be 1'; print('OK: hooks.json valid, events:', list(d['hooks']))"

      - name: Hook scripts are executable
        run: |
          fail=0
          for f in .cursor/hooks/*.sh; do
            [ -x "$f" ] && echo "OK: $f" || { echo "NOT EXECUTABLE: $f"; fail=1; }
          done
          exit $fail

      - name: Shell scripts parse
        run: |
          fail=0
          for f in scripts/*.sh .cursor/hooks/*.sh examples/hooks/*.sh .cursor/skills/*/scripts/*.sh; do
            [ -e "$f" ] || continue
            bash -n "$f" && echo "OK: $f" || { echo "SYNTAX ERROR: $f"; fail=1; }
          done
          exit $fail

      - name: Shellcheck (best effort)
        run: |
          if command -v shellcheck >/dev/null; then
            shellcheck scripts/*.sh .cursor/hooks/*.sh examples/hooks/*.sh .cursor/skills/*/scripts/*.sh || true
          else
            echo "shellcheck not installed; skipping"
          fi
